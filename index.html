<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(180deg,#f8f5f2 0%, #efe7eb 100%);
color:#333;
scroll-behavior:smooth;
}

/* HEADER PREMIUM */
header{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:12px;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:10;
}

header img{
max-width:280px;
transition:0.3s;
}
header img:hover{
transform:scale(1.05);
}

/* CARROSSEL */
.carousel{
max-width:1100px;
margin:25px auto;
overflow:hidden;
border-radius:16px;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.slide img{
width:100%;
height:280px;
object-fit:cover;
transition:0.5s;
}

.slide img:hover{
transform:scale(1.03);
}

.nav{
background:rgba(0,0,0,0.5);
border-radius:50%;
}

/* CATEGORIAS */
.categorias{
margin:25px 0;
}

.cat-btn{
padding:10px 18px;
border-radius:25px;
font-weight:600;
}

.cat-btn.active{
background:linear-gradient(135deg,#b07a86,#d4a5b3);
color:#fff;
}

/* PRODUTOS PREMIUM */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.produto{
background:#fff;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
transition:0.3s;
position:relative;
}

.produto:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.produto img{
height:220px;
transition:0.4s;
}

.produto:hover img{
transform:scale(1.05);
}

/* PREÇO COM DESTAQUE */
.preco{
font-size:18px;
}

/* BOTÃO PREMIUM */
.btn{
background:linear-gradient(135deg,#25D366,#1ebe5d);
font-weight:600;
letter-spacing:0.3px;
}

/* MODAL MAIS CLEAN */
.modal-content{
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* SOBRE PREMIUM */
.sobre{
background:linear-gradient(180deg,#ffffff,#f7eef2);
}

.sobre-img img{
transition:0.4s;
}

.sobre-img img:hover{
transform:scale(1.05) rotate(1deg);
}

/* FOOTER PREMIUM */
footer{
background:linear-gradient(180deg,#fff,#f3e6ea);
}

.footer-icons a{
display:inline-flex;
align-items:center;
justify-content:center;
width:40px;
height:40px;
border-radius:50%;
background:#fff;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.footer-icons a:hover{
transform:translateY(-5px) scale(1.1);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* REMOVE BUG DOS ÍCONES */
.footer-icons img{
display:block;
width:20px;
height:20px;
}

/* WHATSAPP MAIS CHAMATIVO */
.whatsapp-float{
box-shadow:0 10px 25px rgba(37,211,102,0.6);
}

.whatsapp-float:hover{
transform:scale(1.15);
}

/* RESPONSIVO */
@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}

/* SEM PRODUTOS */
.sem-produtos{
display:none;
grid-column: 1 / -1;
text-align:center;
padding:60px 20px;
color:#aaa;
font-size:16px;
}

.sem-produtos span{
font-size:48px;
display:block;
margin-bottom:10px;
}
</style>
