<script>

// CARROSSEL
let index = 0;
const slides = document.getElementById('slides');

function move(dir){
index = (index + dir + 3) % 3;
slides.style.transform = `translateX(-${index * 100}%)`;
}

setInterval(()=>move(1),4000);

// =========================
// 🔥 CORREÇÃO FORTE AQUI
// =========================

function normalizarCategoria(cat){
  return (cat || '')
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, ""); // remove acento
}

function converterLinkDrive(url) {
  if (!url) return '';

  const match1 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (match1) return `https://drive.google.com/thumbnail?id=${match1[1]}&sz=w800`;

  const match2 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (match2) return `https://drive.google.com/thumbnail?id=${match2[1]}&sz=w800`;

  return url;
}

const whatsapp = "554799216167";
const container = document.getElementById('produtos');
const semProdutos = document.getElementById('sem-produtos');

let todosProdutos = [];
let produtoAtual = null;
let imgAtual = 0;

// LOADING SIMPLES
container.innerHTML = "<p style='text-align:center'>Carregando produtos...</p>";

function render(lista) {
  container.innerHTML = '';
  container.appendChild(semProdutos);

  if (!lista || lista.length === 0) {
    semProdutos.style.display = 'block';
    return;
  }

  semProdutos.style.display = 'none';

  lista.forEach((p) => {

    const imagem = converterLinkDrive(p.imagem);

    const div = document.createElement('div');
    div.className = 'produto';

    div.innerHTML = `
      <img src="${imagem}" onerror="this.src='https://via.placeholder.com/300'" onclick="abrirModal(${todosProdutos.indexOf(p)})">
      <div class="info">
        <div class="nome">${p.nome || 'Produto'}</div>
        <div class="preco">R$ ${p.preco || '0,00'}</div>
        <a class="btn" href="https://wa.me/${whatsapp}?text=Olá! Tenho interesse no produto: ${encodeURIComponent(p.nome || '')} - R$ ${p.preco || ''}" target="_blank">
          💬 Quero esse produto
        </a>
      </div>`;
      
    container.appendChild(div);
  });
}

function filtrar(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  render(
    todosProdutos.filter(p => normalizarCategoria(p.categoria) === cat)
  );
}

function abrirModal(i) {
  produtoAtual = i;
  imgAtual = 0;

  const p = todosProdutos[i];
  if(!p) return;

  document.getElementById('modal-nome').textContent = p.nome || '';
  document.getElementById('modal-preco').textContent = `R$ ${p.preco || ''}`;
  document.getElementById('modal-img').src = converterLinkDrive(p.imagem);

  document.getElementById('modal-btn').href =
    `https://wa.me/${whatsapp}?text=Olá! Tenho interesse no produto: ${encodeURIComponent(p.nome || '')} - R$ ${p.preco || ''}`;

  document.getElementById('modal').style.display = 'flex';
}

function fecharModal() {
  document.getElementById('modal').style.display = 'none';
}

function trocarImg(dir) {
  const p = todosProdutos[produtoAtual];
  if(!p) return;

  const imagens = p.imagens
    ? p.imagens.split(',').map(s => converterLinkDrive(s.trim()))
    : [];

  const todas = [converterLinkDrive(p.imagem), ...imagens];

  imgAtual = (imgAtual + dir + todas.length) % todas.length;
  document.getElementById('modal-img').src = todas[imgAtual];
}

function abrirZoom(src) {
  document.getElementById('zoom-img-el').src = src;
  document.getElementById('zoom').style.display = 'flex';
}

function fecharZoom() {
  document.getElementById('zoom').style.display = 'none';
}

window.onclick = function(e) {
  if (e.target === document.getElementById('modal')) fecharModal();
  if (e.target === document.getElementById('zoom')) fecharZoom();
}

// 🔥 FETCH SEGURO
fetch("https://opensheet.elk.sh/1wrHEulJvrvhqPHDxWUUh8fXgq5AKeBI7E6AKB8cBtRw/1")
  .then(r => r.json())
  .then(p => {
    todosProdutos = p || [];

    render(
      todosProdutos.filter(p => normalizarCategoria(p.categoria) === 'aneis')
    );
  })
  .catch(err => {
    container.innerHTML = "<p style='text-align:center;color:red'>Erro ao carregar produtos</p>";
    console.error(err);
  });

</script>
