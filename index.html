<script>
let index=0;
const slides=document.getElementById('slides');
const total=slides.children.length;
const dots=document.getElementById('dots');
for(let i=0;i<total;i++){const d=document.createElement('span');d.className='dot';dots.appendChild(d)}
function update(){slides.style.transform=`translateX(-${index*100}%)`;[...dots.children].forEach((d,i)=>d.classList.toggle('active',i===index))}
function moveSlide(dir){index=(index+dir+total)%total;update()}
setInterval(()=>moveSlide(1),4000);update()

const container=document.getElementById('produtos');
const destaqueContainer=document.getElementById('destaques');

const produtos=[];
const tipos=['brinco','colar','pulseira','anel'];

// 🔥 AGORA USANDO IMAGENS LOCAIS
for(let i=1;i<=18;i++){
  const tipo=tipos[i%4];
  produtos.push({
    nome: tipo+" "+i,
    tipo,
    descricao:"Peça elegante e delicada para qualquer ocasião",
    preco:`R$ ${29+(i%5)*10},90`,
    img:`imagens/produto${(i%6)+1}.jpg`
  })
}

function render(lista){
  container.innerHTML='';
  lista.forEach(p=>{
    const div=document.createElement('div');
    div.className='produto';

    // 🔥 TEXTO DO WHATSAPP FORMATADO CERTO
    const mensagem = encodeURIComponent("Quero " + p.nome);

    div.innerHTML=`
      <img src="${p.img}">
      <div class="info">
        <div class="nome">${p.nome}</div>
        <div class="descricao">${p.descricao}</div>
        <div class="preco">${p.preco}</div>
        <a class="btn" href="https://wa.me/554799216167?text=${mensagem}" target="_blank">
          Comprar
        </a>
      </div>
    `;
    container.appendChild(div);
  })
}

function renderDestaques(){
  produtos.slice(0,3).forEach(p=>{
    const div=document.createElement('div');
    div.className='produto';
    div.innerHTML=`
      <img src="${p.img}">
      <div class="info">
        <div class="nome">${p.nome}</div>
        <div class="preco">${p.preco}</div>
      </div>
    `;
    destaqueContainer.appendChild(div);
  })
}

function filtrar(tipo,el){
  document.querySelectorAll('.categoria').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if(tipo==='todos') return render(produtos);
  render(produtos.filter(p=>p.tipo===tipo));
}

render(produtos);
renderDestaques();
</script>
