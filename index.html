<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Aurora</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* (SEU CSS TODO MANTIDO IGUAL ATÉ O FINAL...) */

/* ADICIONADO - MODAL MELHORADO */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#fff;
border-radius:16px;
max-width:1000px;
width:95%;
padding:25px;
position:relative;
}

.modal-body{
display:flex;
gap:30px;
flex-wrap:wrap;
align-items:center;
}

.modal-imagens{
flex:1;
position:relative;
}

.modal-imagens img{
width:100%;
border-radius:12px;
height:350px;
object-fit:cover;
}

.modal-info{
flex:1;
}

.modal-nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:#fff;
border:none;
padding:10px;
cursor:pointer;
}

.modal-prev{left:10px}
.modal-next{right:10px}

.fechar{
position:absolute;
top:10px;
right:20px;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TODO SEU HTML ORIGINAL MANTIDO -->

<!-- MODAL -->
<div id="modalProduto" class="modal">
<div class="modal-content">
<span class="fechar" onclick="fecharModal()">×</span>

<div class="modal-body">
<div class="modal-imagens">
<button class="modal-nav modal-prev" onclick="trocarImg(-1)">❮</button>
<img id="imgModal">
<button class="modal-nav modal-next" onclick="trocarImg(1)">❯</button>
</div>

<div class="modal-info">
<h2 id="tituloProduto"></h2>
<p id="precoProduto"></p>
<p>Semijoia elegante e de alta qualidade ✨</p>
<a id="btnComprarModal" class="btn" target="_blank">Comprar</a>
</div>
</div>

</div>
</div>

<script>

/* SEU SCRIPT ORIGINAL MANTIDO */

let imagensModal = [];
let indexImg = 0;

/* ALTERAÇÃO SEGURA (NÃO QUEBRA FILTRO) */
function render(produtos){
container.innerHTML = "";

produtos.forEach(p => {

const msg = encodeURIComponent("Quero " + p.nome);

const div = document.createElement('div');
div.className='produto';

div.innerHTML=`
<img src="${p.imagem}" onclick="abrirModal('${p.nome}','${p.preco}','${p.imagem}')">
<div class="info">
<div class="nome">${p.nome}</div>
<div class="preco">R$ ${p.preco}</div>
<a class="btn" href="https://wa.me/554799216167?text=${msg}" target="_blank">Comprar</a>
</div>
`;

container.appendChild(div);
});
}

/* NOVO - MODAL */
function abrirModal(nome, preco, imagem){
document.getElementById('modalProduto').style.display = 'flex';

imagensModal = [imagem, imagem];
indexImg = 0;

document.getElementById('imgModal').src = imagem;
document.getElementById('tituloProduto').innerText = nome;
document.getElementById('precoProduto').innerText = "R$ " + preco;

document.getElementById('btnComprarModal').href =
"https://wa.me/554799216167?text=" + encodeURIComponent("Quero " + nome);
}

function trocarImg(dir){
indexImg = (indexImg + dir + imagensModal.length) % imagensModal.length;
document.getElementById('imgModal').src = imagensModal[indexImg];
}

function fecharModal(){
document.getElementById('modalProduto').style.display = 'none';
}

</script>

</body>
</html>
